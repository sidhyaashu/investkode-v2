version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: investkode_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth_db:
    image: postgres:15-alpine
    container_name: investkode_auth_db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: ./auth_service
    container_name: investkode_auth_service
    env_file:
      - .env
    environment:
      - REDIS_URL=${AUTH_REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy
      auth_db:
        condition: service_healthy
    ports:
      - "8001:8000"

  api_gateway:
    build:
      context: ./api_gateway
    container_name: investkode_api_gateway
    env_file:
      - .env
    environment:
      - REDIS_URL=${GATEWAY_REDIS_URL}
      - WATCHLIST_SERVICE_URL=${WATCHLIST_SERVICE_URL}
    depends_on:
      redis:
        condition: service_healthy
      auth_service:
        condition: service_started
      watchlist_service:
        condition: service_started
    ports:
      - "8000:8000"

  watchlist_service:
    build:
      context: ./watchlist_service
    container_name: investkode_watchlist_service
    env_file:
      - .env
    environment:
      - WATCHLIST_DATABASE_URL=${WATCHLIST_DATABASE_URL}
      - FINANCIAL_DATABASE_URL=${FINANCIAL_DATABASE_URL}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    depends_on:
      auth_db:
        condition: service_healthy
    ports:
      - "8002:8000"
